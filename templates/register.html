{% extends 'base.html' %}
{% set title = t('page.register.title') %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <h1 class="h3 mb-3 text-center">{{ t('register.heading') }}</h1>
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">{{ t('form.username') }}</label>
            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">{{ t('form.password') }}</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary w-100">{{ t('register.submit') }}</button>
        </form>
        <p class="mt-3 small text-center mb-0">{{ t('register.has_account') }}
          <a href="{{ url_for('login') }}">{{ t('register.login_link') }}</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
