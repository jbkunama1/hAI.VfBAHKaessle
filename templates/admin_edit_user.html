{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
  <div>
    <h1 class="admin-title mb-1">User bearbeiten</h1>
    <p class="admin-subtitle mb-0">{{ edit_user.username }}</p>
  </div>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light btn-sm">← Zurück zur Übersicht</a>
</div>

<div class="card" style="max-width: 560px;">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label for="username" class="form-label small text-uppercase text-muted">Benutzername</label>
        <input type="text" id="username" name="username" class="form-control" value="{{ edit_user.username }}" required>
      </div>

      <div class="mb-3">
        <label for="telegram_id" class="form-label small text-uppercase text-muted">Telegram-ID</label>
        <input type="number" id="telegram_id" name="telegram_id" class="form-control" value="{{ edit_user.telegram_id or '' }}" placeholder="optional">
      </div>

      <div class="mb-3">
        <label for="new_password" class="form-label small text-uppercase text-muted">Neues Passwort</label>
        <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Leer lassen, um Passwort nicht zu ändern">
      </div>

      <div class="form-check form-switch mb-4">
        <input class="form-check-input" type="checkbox" role="switch" id="is_admin" name="is_admin" {% if edit_user.is_admin %}checked{% endif %}>
        <label class="form-check-label" for="is_admin">Admin-Rechte</label>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Speichern</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light">Abbrechen</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
