{% extends 'base.html' %}
{% set title = t('page.admin_edit_user.title') %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
  <div>
    <h1 class="admin-title mb-1">{{ t('admin_edit_user.heading') }}</h1>
    <p class="admin-subtitle mb-0">{{ edit_user.username }}</p>
  </div>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light btn-sm">{{ t('admin.back_overview') }}</a>
</div>

<div class="card" style="max-width: 560px;">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label for="username" class="form-label small text-uppercase text-muted">{{ t('form.username') }}</label>
        <input type="text" id="username" name="username" class="form-control" value="{{ edit_user.username }}" required>
      </div>

      <div class="mb-3">
        <label for="telegram_id" class="form-label small text-uppercase text-muted">{{ t('form.telegram_id') }}</label>
        <input type="number" id="telegram_id" name="telegram_id" class="form-control" value="{{ edit_user.telegram_id or '' }}" placeholder="{{ t('form.optional') }}">
      </div>

      <div class="mb-3">
        <label for="new_password" class="form-label small text-uppercase text-muted">{{ t('form.new_password') }}</label>
        <input type="password" id="new_password" name="new_password" class="form-control" placeholder="{{ t('admin_edit_user.password_hint') }}">
      </div>

      <div class="form-check form-switch mb-4">
        <input class="form-check-input" type="checkbox" role="switch" id="is_admin" name="is_admin" {% if edit_user.is_admin %}checked{% endif %}>
        <label class="form-check-label" for="is_admin">{{ t('form.admin_rights') }}</label>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ t('action.save') }}</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light">{{ t('action.cancel') }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
